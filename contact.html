<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Daily Dollar Ebooks</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <a href="index.html" style="text-decoration: none;"><h1>Daily Dollar <span>Ebooks</span></h1></a>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html#ebooks">Browse</a></li>
                    <li><a href="index.html#bundles">Bundles</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container" style="padding: 60px 20px;">
        <h2>Contact Us</h2>
        <p style="margin-bottom: 30px;">Have questions or need help with a download? Reach out to us!</p>
        
        <form style="max-width: 600px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 5px; font-weight: 600;">Name</label>
                <input type="text" style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px;">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 5px; font-weight: 600;">Email</label>
                <input type="email" style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px;">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 5px; font-weight: 600;">Message</label>
                <textarea style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; height: 150px;"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Send Message</button>
        </form>
    </main>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 Daily Dollar Ebooks. All rights reserved.</p>
            </div>
        </div>
    </footer>
</body>
</html>
